<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙야크 100대 명산 스마트 지도</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --sidebar-width: 390px;
      --primary: #176b43;
      --primary-dark: #0e4b2e;
      --accent: #ef7d22;
      --bg: #f4f7f5;
      --card: #ffffff;
      --text: #17211b;
      --muted: #68746d;
      --border: #dce5df;
      --shadow: 0 8px 24px rgba(19, 60, 39, .12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      background: var(--card);
      display: flex;
      flex-direction: column;
      z-index: 1001;
      box-shadow: var(--shadow);
    }

    .sidebar-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo-icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      font-size: 22px;
    }

    .app-title {
      margin: 0;
      font-size: 21px;
    }

    .app-subtitle {
      margin: 5px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .stats-board {
      padding: 14px 18px;
      background: #f8fbf9;
      border-bottom: 1px solid var(--border);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      padding: 11px 6px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
    }

    .stat-value.climbed {
      color: var(--primary);
    }

    .stat-value.accent {
      color: var(--accent);
    }

    .stat-label {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .progress-container {
      margin-top: 11px;
    }

    .progress-bar-bg {
      height: 8px;
      background: #dfe8e2;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      width: 0;
      height: 100%;
      background: var(--primary);
      transition: width .25s;
    }

    .search-filter-section {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .search-box {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .search-input {
      width: 100%;
      padding: 11px 12px 11px 38px;
      border: 1px solid var(--border);
      border-radius: 11px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 107, 67, .12);
    }

    .filter-scroll-wrapper {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 11px 0 5px;
      scrollbar-width: thin;
    }

    .filter-badge {
      white-space: nowrap;
      cursor: pointer;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      background: white;
    }

    .filter-badge.active {
      color: white;
      border-color: var(--primary);
      background: var(--primary);
    }

    .toggle-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      padding-top: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #435048;
      cursor: pointer;
    }

    .checkbox-label input {
      accent-color: var(--primary);
    }

    .mountain-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .mountain-card {
      margin-bottom: 9px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      overflow: hidden;
    }

    .mountain-card.hidden {
      display: none;
    }

    .mountain-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(23, 107, 67, .13);
    }

    .mountain-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 12px;
      cursor: pointer;
    }

    .mountain-title {
      font-weight: 750;
      font-size: 14px;
    }

    .mountain-meta {
      color: var(--muted);
      font-size: 11px;
      margin-top: 3px;
    }

    .mountain-status {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .mountain-status.done {
      color: var(--primary);
      font-weight: 700;
    }

    .sites {
      border-top: 1px solid var(--border);
    }

    .site-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-top: 1px dashed #edf1ee;
      cursor: pointer;
      font-size: 12px;
    }

    .site-row:first-child {
      border-top: 0;
    }

    .site-row:hover {
      background: #f6faf7;
    }

    .site-row input {
      accent-color: var(--primary);
    }

    .site-height {
      color: var(--muted);
    }

    .map-container,
    #map {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    .sidebar-toggle-btn {
      display: none;
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 1300;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 12px;
      color: white;
      background: var(--primary);
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .popup-title {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .popup-line {
      margin: 3px 0;
    }

    .popup-links {
      display: flex;
      gap: 6px;
      margin-top: 9px;
    }

    .popup-links a {
      text-decoration: none;
      padding: 6px 8px;
      border-radius: 7px;
      color: white !important;
      background: var(--primary);
      font-size: 11px;
    }

    .empty-state {
      padding: 30px 15px;
      text-align: center;
      color: var(--muted);
    }

    /* Shortest Course Styles */
    .course-section {
      padding: 12px;
      background: #fdfefe;
      border-top: 1px solid var(--border);
      font-size: 12.5px;
    }

    .course-empty {
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .course-summary {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      color: var(--text);
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .summary-item i {
      color: var(--primary);
      width: 14px;
      text-align: center;
    }

    .difficulty-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }

    .diff-level-1 {
      background: #dcfce7;
      color: #15803d;
    }

    .diff-level-2 {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .diff-level-3 {
      background: #fef9c3;
      color: #a16207;
    }

    .diff-level-4 {
      background: #ffedd5;
      color: #c2410c;
    }

    .diff-level-5 {
      background: #fee2e2;
      color: #b91c1c;
    }

    .diff-level-none {
      background: #f1f5f9;
      color: #64748b;
    }

    .course-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .btn-action {
      flex: 1;
      padding: 6px 4px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .btn-action:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .btn-action.btn-detail-toggle {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .btn-action.btn-detail-toggle.active {
      background: #e2e8f0;
      border-color: #94a3b8;
    }

    .course-detail {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .course-detail.hidden {
      display: none;
    }

    .detail-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-group-title {
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 11.5px;
      border-left: 3px solid var(--primary);
      padding-left: 6px;
      margin-bottom: 2px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
    }

    .detail-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-row.full-width {
      grid-column: span 2;
    }

    .detail-label {
      font-size: 10.5px;
      color: var(--muted);
      font-weight: 600;
    }

    .detail-value {
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
    }

    .detail-value a {
      color: var(--primary);
      text-decoration: underline;
    }

    /* Additional Advanced Filters */
    .advanced-filter-btn {
      width: 100%;
      padding: 8px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .advanced-filter-btn:hover {
      background: #e2e8f0;
    }

    .advanced-filter-panel {
      padding: 10px 0 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px dashed var(--border);
      margin-top: 8px;
    }

    .advanced-filter-panel.hidden {
      display: none;
    }

    .filter-select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      font-size: 12px;
      outline: none;
    }

    .filter-select:focus {
      border-color: var(--primary);
    }

    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
    }

    @media (max-width: 800px) {
      .sidebar-toggle-btn {
        display: block;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: min(88vw, 390px);
        min-width: 0;
        transform: translateX(-105%);
        transition: transform .25s;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .map-container {
        width: 100%;
      }
    }
  </style>

</head>

<body>

  <div class="app-container">

    <!-- Mobile Sidebar Toggle Button -->
    <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="메뉴 열기">
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">

      <!-- Header -->
      <div class="sidebar-header">
        <div class="logo-section">
          <div class="logo-icon">
            <i class="fa-solid fa-mountain"></i>
          </div>
          <div>
            <h1 class="app-title">명산 100 스마트 맵</h1>
            <p class="app-subtitle">블랙야크 100대 명산 완등 챌린지</p>
          </div>
        </div>
      </div>

      <!-- Search & Filters -->
      <div class="search-filter-section">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="search-input" class="search-input" placeholder="산 이름 또는 지역 검색...">
        </div>

        <!-- Region Filter Badges -->
        <div class="filter-scroll-wrapper" id="region-filters">
          <div class="filter-badge active" data-region="all">전체</div>
          <div class="filter-badge" data-region="강원">강원</div>
          <div class="filter-badge" data-region="경기">경기/인천</div>
          <div class="filter-badge" data-region="충청">충청</div>
          <div class="filter-badge" data-region="전라">전라</div>
          <div class="filter-badge" data-region="경상">경상/울산</div>
          <div class="filter-badge" data-region="제주">제주</div>
        </div>

        <!-- Advanced Course Filters Toggle -->
        <button class="advanced-filter-btn" id="btn-toggle-adv-filters" type="button">
          <i class="fa-solid fa-sliders"></i> 상세 코스 필터 열기
        </button>

        <!-- Collapsible Advanced Course Filters -->
        <div class="advanced-filter-panel hidden" id="adv-filter-panel">
          <div style="margin-bottom: 6px;">
            <select id="filter-difficulty" class="filter-select">
              <option value="all">모든 난이도</option>
              <option value="1">난이도: 쉬움 (1단계)</option>
              <option value="2">난이도: 보통 (2단계)</option>
              <option value="3">난이도: 어려움 (3단계)</option>
              <option value="4">난이도: 매우 어려움 (4단계)</option>
              <option value="5">난이도: 전문가 수준 (5단계)</option>
            </select>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px 10px;">
            <label class="checkbox-label">
              <input type="checkbox" id="filter-dist-5">
              <span>왕복 5km 이하</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="filter-dist-10">
              <span>왕복 10km 이하</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="filter-free-parking">
              <span>무료 주차</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="filter-free-entrance">
              <span>무료 입장</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="filter-has-toilet">
              <span>화장실 있음</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Mountain List Container -->
      <div class="mountain-list-container" id="mountain-list">
        <!-- Rendered dynamically by app.js -->
        <div style="text-align: center; padding: 20px; color: var(--text-muted);">
          <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 24px; margin-bottom: 8px;"></i>
          <p>산 목록을 불러오는 중입니다...</p>
        </div>
      </div>

    </aside>

    <!-- Map Container -->
    <main class="map-container">
      <div id="map"></div>
    </main>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  </script>
  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "blackyak100-completed-sites-v1";
      let savedCompleted = [];
      try {
        savedCompleted = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch (error) {
        console.warn("완등 기록을 불러오지 못했습니다.", error);
      }
      const completed = new Set(Array.isArray(savedCompleted) ? savedCompleted : []);
      const markerByPeakId = new Map();
      const cardByMountainId = new Map();
      const startMarkerByMountainId = new Map();
      const polylineByMountainId = new Map();
      let activeRegion = "all";
      let map;
      let markerLayer;

      const nationalParkNames = new Set([
        "치악산", "오대산(노인봉)", "오대산(비로봉)", "설악산", "태백산",
        "계룡산(공주)", "내변산(변산반도)", "내장산", "덕유산(무주)",
        "월출산", "무등산(광주)", "주왕산", "소백산", "가야산(합천)",
        "속리산", "월악산", "지리산", "한라산"
      ]);

      const $ = (id) => document.getElementById(id);
      const esc = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[ch]);

      function saveCompleted() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed]));
        } catch (error) {
          console.warn("완등 기록을 저장하지 못했습니다.", error);
        }
      }

      function getMountainSites(mountainId) {
        return certificationSites.filter(site => site.mountain_id === mountainId);
      }

      function isMountainDone(mountainId) {
        const sites = getMountainSites(mountainId);
        return sites.length > 0 && sites.every(site => completed.has(site.peak_id));
      }

      function regionMatches(region, filter) {
        if (filter === "all") return true;
        const groups = {
          "강원": ["강원도"],
          "경기": ["경기도", "인천"],
          "서울": ["서울"],
          "충청": ["충청남도", "충청북도"],
          "전라": ["전라북도", "전라남도", "광주"],
          "경상": ["경상북도", "경상남도", "대구", "울산", "부산"],
          "지리산": ["지리산"],
          "제주": ["제주도"]
        };
        return (groups[filter] || []).includes(region);
      }

      function markerIcon(done) {
        return L.divIcon({
          className: "",
          html: `<div style="
          width:28px;height:28px;border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);background:${done ? "#176b43" : "#ef7d22"};
          border:3px solid white;box-shadow:0 2px 7px rgba(0,0,0,.35)">
          <span style="display:block;transform:rotate(45deg);color:white;text-align:center;line-height:21px;font-size:11px">
            <i class="fa-solid fa-mountain"></i>
          </span>
        </div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 28],
          popupAnchor: [0, -27]
        });
      }

      function popupHtml(site) {
        const mountain = mountains.find(m => Number(m.id) === Number(site.mountain_id));
        const course = mountain?.shortestCourse || {};
        const summitKakao = `https://map.kakao.com/link/map/${encodeURIComponent(
          site.mountain_name + " " + site.certification_site
        )},${site.lat},${site.lng}`;
        const startQuery = `${site.mountain_name} ${course.startName || ""}`.trim();
        const startKakao = `https://map.kakao.com/link/search/${encodeURIComponent(startQuery)}`;

        let distanceText = "정보 확인 중";
        if (course.distanceRoundTripKm != null) {
          distanceText = `왕복 약 ${course.distanceRoundTripKm}km / 편도 약 ${course.distanceOneWayKm ?? (course.distanceRoundTripKm / 2)}km`;
        }

        return `
        <div style="min-width:250px;line-height:1.55;">
          <div class="popup-title">${esc(site.mountain_name)}</div>
          <div class="popup-line"><b>인증장소:</b> ${esc(site.certification_site)}</div>
          <div class="popup-line"><b>해발:</b> ${site.height_m}m</div>
          <div class="popup-line"><b>최단코스 출발지:</b> ${esc(course.startName || "정보 확인 중")}</div>
          <div class="popup-line"><b>거리:</b> ${esc(distanceText)}</div>
          <div class="popup-line"><b>난이도:</b> ${esc(course.difficulty || "정보 확인 중")}</div>
          <div class="popup-line"><b>입장료:</b> ${esc(course.entranceFee || "정보 확인 중")}</div>
          <div class="popup-line"><b>주차비:</b> ${esc(course.parking?.fee || "정보 확인 중")}</div>
          <div class="popup-links" style="flex-wrap:wrap">
            <a href="${summitKakao}" target="_blank" rel="noopener">정상 카카오맵</a>
            <a href="${startKakao}" target="_blank" rel="noopener" style="background:#2563eb">최단코스 출발지 카카오맵</a>
          </div>
        </div>`;
      }

      function startMarkerIcon() {
        return L.divIcon({
          className: "",
          html: `<div style="
          width:28px;height:28px;border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);background:#2563eb;
          border:3px solid white;box-shadow:0 2px 7px rgba(0,0,0,.35)">
          <span style="display:block;transform:rotate(45deg);color:white;text-align:center;line-height:21px;font-size:11px">
            <i class="fa-solid fa-flag"></i>
          </span>
        </div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 28],
          popupAnchor: [0, -27]
        });
      }

      function getDifficultyText(level, text) {
        if (level) {
          const levels = {
            1: "쉬움 (1단계)",
            2: "보통 (2단계)",
            3: "어려움 (3단계)",
            4: "매우 어려움 (4단계)",
            5: "전문가 수준 (5단계)"
          };
          return levels[level] || text || "확인 필요";
        }
        return text || "확인 필요";
      }

      function getDifficultyBadge(level, text) {
        const lv = level || (text === "쉬움" ? 1 : text === "보통" ? 2 : text === "어려움" ? 3 : text === "매우 어려움" ? 4 : text === "전문가 수준" ? 5 : null);
        const label = getDifficultyText(lv, text);
        const cls = lv ? `diff-level-${lv}` : 'diff-level-none';
        let stars = "";
        if (lv) {
          stars = " " + "★".repeat(lv) + "☆".repeat(5 - lv);
        }
        return `<span class="difficulty-badge ${cls}">${esc(label)}${stars}</span>`;
      }

      function startPopupHtml(m) {
        const sc = m.shortestCourse;
        const diffBadge = getDifficultyBadge(sc.difficultyLevel, sc.difficulty);
        const distStr = sc.distanceRoundTripKm ? `${sc.distanceRoundTripKm}km (왕복)` : "확인 필요";
        const timeStr = sc.estimatedTimeRoundTrip || "확인 필요";
        const parkingStr = sc.parking && sc.parking.name ? sc.parking.name : "확인 필요";

        return `
        <div style="font-size:12px; line-height: 1.5; min-width: 200px;">
          <div class="popup-title" style="color:#2563eb; margin-bottom: 8px;">
            <i class="fa-solid fa-flag"></i> ${esc(m.name)} 최단코스 출발지
          </div>
          <div class="popup-line"><b>출발지명:</b> ${esc(sc.startName)}</div>
          <div class="popup-line"><b>코스명:</b> ${esc(sc.startName)} ~ ${esc(sc.certificationSite)} 코스</div>
          <div class="popup-line"><b>왕복 거리:</b> ${distStr}</div>
          <div class="popup-line"><b>소요 시간:</b> ${timeStr}</div>
          <div class="popup-line"><b>난이도:</b> ${diffBadge}</div>
          <div class="popup-line"><b>주차 정보:</b> ${esc(parkingStr)}</div>
          <div style="margin-top: 8px; font-size: 10.5px; color: #ef7d22; border-top: 1px dashed #ddd; padding-top: 6px; font-weight: bold;">
            <i class="fa-solid fa-triangle-exclamation"></i> 실제 등산로가 아닌 위치 연결선
          </div>
        </div>
      `;
      }

      function initMap() {
        map = L.map("map", { preferCanvas: true }).setView([36.35, 127.85], 7);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);
        markerLayer = L.layerGroup().addTo(map);
      }

      function createMarkers() {
        certificationSites.forEach(site => {
          const marker = L.marker([site.lat, site.lng], {
            icon: markerIcon(completed.has(site.peak_id)),
            title: `${site.mountain_name} ${site.certification_site}`
          }).bindPopup(() => popupHtml(site));

          marker.on("click", () => focusMountainCard(site.mountain_id));
          markerByPeakId.set(site.peak_id, marker);
        });

        mountains.forEach(m => {
          if (m.shortestCourse && m.shortestCourse.startLat && m.shortestCourse.startLng) {
            const sc = m.shortestCourse;
            const sites = getMountainSites(m.id);
            const matchedSite = sites.find(s => s.certification_site === sc.certificationSite) || sites[0];

            if (matchedSite) {
              const startMarker = L.marker([sc.startLat, sc.startLng], {
                icon: startMarkerIcon(),
                title: `${m.name} 최단코스 출발지 (${sc.startName})`
              }).bindPopup(() => startPopupHtml(m));

              startMarker.on("click", () => focusMountainCard(m.id));
              startMarkerByMountainId.set(m.id, startMarker);

              const polyline = L.polyline([[sc.startLat, sc.startLng], [matchedSite.lat, matchedSite.lng]], {
                color: "#2563eb",
                weight: 2,
                dashArray: "6, 6",
                interactive: true
              }).bindPopup(`
              <div style="font-size:12px; line-height: 1.4; min-width: 180px;">
                <b style="color: #2563eb;"><i class="fa-solid fa-route"></i> 최단코스 연결선</b><br>
                <span style="color: var(--muted); font-size: 11px;">${esc(m.name)}: ${esc(sc.startName)} &rarr; ${esc(matchedSite.certification_site)}</span>
                <div style="margin-top: 6px; border-top: 1px solid #eee; padding-top: 4px; font-weight: bold; color: #ef7d22;">
                  <i class="fa-solid fa-triangle-exclamation"></i> 실제 등산로가 아닌 위치 연결선
                </div>
              </div>
            `);
              polylineByMountainId.set(m.id, polyline);
            }
          }
        });

        refreshMarkers();
      }

      function refreshMarkers() {
        markerLayer.clearLayers();
        const filtered = getFilteredMountains();
        const visibleIds = new Set(filtered.map(m => m.id));

        certificationSites.forEach(site => {
          if (visibleIds.has(site.mountain_id)) {
            const marker = markerByPeakId.get(site.peak_id);
            if (marker) {
              marker.setIcon(markerIcon(completed.has(site.peak_id)));
              markerLayer.addLayer(marker);
            }
          }
        });

        filtered.forEach((m, sortedIndex) => {
          if (m.shortestCourse) {
            const startMarker = startMarkerByMountainId.get(m.id);
            const polyline = polylineByMountainId.get(m.id);
            if (startMarker) markerLayer.addLayer(startMarker);
            if (polyline) markerLayer.addLayer(polyline);
          }
        });
      }

      function getFilteredMountains() {
        const query = $("search-input").value.trim().toLowerCase();
        const onlyUnclimbed = false;
        const onlyNational = false;

        const filterDiff = $("filter-difficulty")?.value || "all";
        const filterDist5 = $("filter-dist-5")?.checked || false;
        const filterDist10 = $("filter-dist-10")?.checked || false;
        const filterFreeParking = $("filter-free-parking")?.checked || false;
        const filterFreeEntrance = $("filter-free-entrance")?.checked || false;
        const filterNoReserve = $("filter-no-reserve")?.checked || false;
        const filterHasToilet = $("filter-has-toilet")?.checked || false;
        const filterHasCourse = $("filter-has-course")?.checked || false;

        return mountains.filter(m => {
          const sites = m.certification_sites || [];
          const searchTerms = [
            m.name, m.region,
            ...sites.flatMap(s => [s.peak, s.height])
          ];

          if (m.shortestCourse) {
            const sc = m.shortestCourse;
            if (sc.startName) searchTerms.push(sc.startName);
            if (sc.parking && sc.parking.name) searchTerms.push(sc.parking.name);
            if (sc.route && sc.route.length) searchTerms.push(...sc.route);
            if (sc.difficulty) searchTerms.push(sc.difficulty);
            if (sc.difficultyLevel) {
              const levelNames = ["쉬움", "보통", "어려움", "매우 어려움", "전문가"];
              const term = levelNames[sc.difficultyLevel - 1];
              if (term) searchTerms.push(term);
            }
          }

          const text = searchTerms.join(" ").toLowerCase();

          // 1. Region match
          if (!regionMatches(m.region, activeRegion)) return false;

          // 2. Query text match
          if (query && !text.includes(query)) return false;

          // 3. Climbed status match
          if (onlyUnclimbed && isMountainDone(m.id)) return false;

          // 4. National park match
          if (onlyNational && !nationalParkNames.has(m.name)) return false;

          // 5. Course existence filter
          if (filterHasCourse && !m.shortestCourse) return false;

          // Course specific filters
          if (m.shortestCourse) {
            const sc = m.shortestCourse;

            // Difficulty filter
            if (filterDiff !== "all") {
              const scLv = sc.difficultyLevel || (sc.difficulty === "쉬움" ? 1 : sc.difficulty === "보통" ? 2 : sc.difficulty === "어려움" ? 3 : sc.difficulty === "매우 어려움" ? 4 : sc.difficulty === "전문가 수준" ? 5 : null);
              if (String(scLv) !== filterDiff) return false;
            }

            // Distance filters
            if (filterDist5) {
              if (sc.distanceRoundTripKm === null || sc.distanceRoundTripKm > 5) return false;
            }
            if (filterDist10) {
              if (sc.distanceRoundTripKm === null || sc.distanceRoundTripKm > 10) return false;
            }

            // Free parking filter
            if (filterFreeParking) {
              const parkingFee = sc.parking?.fee || "";
              if (!parkingFee.includes("무료")) return false;
            }

            // Free entrance filter
            if (filterFreeEntrance) {
              const fee = sc.entranceFee || "";
              if (!fee.includes("무료")) return false;
            }

            // No reservation filter
            if (filterNoReserve) {
              if (sc.reservationRequired !== false) return false;
            }

            // Restrooms filter
            if (filterHasToilet) {
              if (sc.restroom !== true) return false;
            }
          } else {
            // If no course registered, hide if any course filter is active
            const anyCourseFilterActive = (filterDiff !== "all") || filterDist5 || filterDist10 || filterFreeParking || filterFreeEntrance || filterNoReserve || filterHasToilet;
            if (anyCourseFilterActive) return false;
          }

          return true;
        }).sort((a, b) => a.name.localeCompare(b.name, "ko-KR"));
      }

      function renderList() {
        const list = $("mountain-list");
        const filtered = getFilteredMountains();

        if (!filtered.length) {
          list.innerHTML = `<div class="empty-state">조건에 맞는 산이 없습니다.</div>`;
          refreshMarkers();
          return;
        }

        list.innerHTML = filtered.map((m, index) => {
          const sites = getMountainSites(m.id);
          const sc = m.shortestCourse || {};
          const summit = sites[0];
          const startQuery = `${m.name} ${sc.startName || ""}`.trim();
          const startKakao = `https://map.kakao.com/link/search/${encodeURIComponent(startQuery)}`;
          const summitKakao = summit
            ? `https://map.kakao.com/link/map/${encodeURIComponent(m.name + " " + summit.certification_site)},${summit.lat},${summit.lng}`
            : "#";
          const distance = sc.distanceRoundTripKm != null
            ? `왕복 약 ${sc.distanceRoundTripKm}km / 편도 약 ${sc.distanceOneWayKm ?? (sc.distanceRoundTripKm / 2)}km`
            : "정보 확인 중";

          return `
          <div class="mountain-card" data-mountain-id="${m.id}">
            <div class="mountain-head" data-peak-id="${summit?.peak_id || ""}">
              <div>
                <div class="mountain-title">${index + 1}. ${esc(m.name)}</div>
                <div class="mountain-meta">${esc(m.region)} · ${m.height}m · 인증지 ${sites.length}개</div>
              </div>
            </div>
            <div class="course-section">
              <div class="summary-grid">
                <div class="summary-item" style="grid-column:span 2"><i class="fa-solid fa-location-dot"></i><span><b>최단코스:</b> ${esc(sc.startName || "정보 확인 중")}</span></div>
                <div class="summary-item" style="grid-column:span 2"><i class="fa-solid fa-route"></i><span><b>거리:</b> ${esc(distance)}</span></div>
                <div class="summary-item"><i class="fa-solid fa-gauge-high"></i><span><b>난이도:</b> ${esc(sc.difficulty || "정보 확인 중")}</span></div>
                <div class="summary-item"><i class="fa-solid fa-ticket"></i><span><b>입장료:</b> ${esc(sc.entranceFee || "정보 확인 중")}</span></div>
                <div class="summary-item" style="grid-column:span 2"><i class="fa-solid fa-square-parking"></i><span><b>주차비:</b> ${esc(sc.parking?.fee || "정보 확인 중")}</span></div>
              </div>
              <div class="course-actions">
                <a class="btn-action" href="${summitKakao}" target="_blank" rel="noopener"><i class="fa-solid fa-mountain"></i> 정상 카카오맵</a>
                <a class="btn-action" href="${startKakao}" target="_blank" rel="noopener"><i class="fa-solid fa-flag"></i> 출발지 카카오맵</a>
              </div>
            </div>
          </div>`;
        }).join("");

        list.querySelectorAll(".mountain-head").forEach(head => {
          head.addEventListener("click", () => {
            const peakId = head.dataset.peakId;
            if (peakId) moveToSite(peakId);
          });
        });

        refreshMarkers();
      }

      function toggleSite(peakId, checked) {
        checked ? completed.add(peakId) : completed.delete(peakId);
        saveCompleted();
        updateStats();
        renderList();
        const marker = markerByPeakId.get(peakId);
        if (marker) marker.setIcon(markerIcon(checked));
      }

      function moveToSite(peakId) {
        const marker = markerByPeakId.get(peakId);
        if (!marker) return;
        const site = certificationSites.find(s => s.peak_id === peakId);
        if (!site) return;
        map.setView([site.lat, site.lng], 14, { animate: true });
        marker.openPopup();
        focusMountainCard(site.mountain_id);
        if (window.innerWidth <= 800) $("sidebar").classList.remove("open");
      }

      function focusMountainCard(mountainId) {
        document.querySelectorAll(".mountain-card.active").forEach(el => el.classList.remove("active"));
        const card = [...document.querySelectorAll(".mountain-card")]
          .find(el => Number(el.dataset.mountainId) === Number(mountainId));
        if (card) {
          card.classList.add("active");
          card.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      function updateStats() {
        // 통계판 삭제됨
      }

      function bindEvents() {
        $("search-input")?.addEventListener("input", renderList);



        // Advanced course filters
        $("btn-toggle-adv-filters")?.addEventListener("click", () => {
          const panel = $("adv-filter-panel");
          const btn = $("btn-toggle-adv-filters");
          if (!panel || !btn) return;
          const isHidden = panel.classList.toggle("hidden");
          btn.innerHTML = isHidden
            ? `<i class="fa-solid fa-sliders"></i> 상세 코스 필터 열기`
            : `<i class="fa-solid fa-sliders"></i> 상세 코스 필터 닫기`;
        });

        $("filter-difficulty")?.addEventListener("change", renderList);
        $("filter-dist-5")?.addEventListener("change", renderList);
        $("filter-dist-10")?.addEventListener("change", renderList);
        $("filter-free-parking")?.addEventListener("change", renderList);
        $("filter-free-entrance")?.addEventListener("change", renderList);

        $("filter-has-toilet")?.addEventListener("change", renderList);


        $("region-filters")?.addEventListener("click", e => {
          const badge = e.target.closest(".filter-badge");
          if (!badge) return;
          document.querySelectorAll(".filter-badge").forEach(el => el.classList.remove("active"));
          badge.classList.add("active");
          activeRegion = badge.dataset.region;
          renderList();
        });

        $("sidebar-toggle")?.addEventListener("click", () => {
          $("sidebar")?.classList.toggle("open");
          setTimeout(() => map.invalidateSize(), 260);
        });

        window.addEventListener("resize", () => map.invalidateSize());
      }

      function patchRegionFilters() {
        const box = $("region-filters");
        if (!box) return;
        box.innerHTML = `
        <div class="filter-badge active" data-region="all">전체</div>
        <div class="filter-badge" data-region="강원">강원</div>
        <div class="filter-badge" data-region="경기">경기/인천</div>
        <div class="filter-badge" data-region="서울">서울</div>
        <div class="filter-badge" data-region="충청">충청</div>
        <div class="filter-badge" data-region="전라">전라/광주</div>
        <div class="filter-badge" data-region="경상">경상/대구/울산/부산</div>
        <div class="filter-badge" data-region="지리산">지리산</div>
        <div class="filter-badge" data-region="제주">제주</div>`;
      }

      function startApp() {
        if (!window.L) {
          $("mountain-list").innerHTML = `<div class="empty-state">Leaflet을 불러오지 못했습니다. 인터넷 연결을 확인하세요.</div>`;
          return;
        }
        if (typeof mountains === "undefined" || typeof certificationSites === "undefined" ||
          !Array.isArray(mountains) || !Array.isArray(certificationSites)) {
          $("mountain-list").innerHTML = `<div class="empty-state">산 좌표 데이터가 없습니다.</div>`;
          return;
        }
        patchRegionFilters();
        initMap();
        createMarkers();
        bindEvents();
        updateStats();
        renderList();
        setTimeout(() => map.invalidateSize(), 150);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", startApp, { once: true });
      } else {
        startApp();
      }
    })();
  </script>

</body>

</html>
